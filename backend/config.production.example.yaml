# Production template for a single-node Technology Research & Evaluation Agent.
# Copy to /data/deer-flow/config.yaml and replace only non-secret operational
# values. Keep real secrets in environment variables such as DEEPSEEK_API_KEY.

config_version: 12
log_level: info

token_usage:
  enabled: true

models:
  - name: deepseek-v4-flash
    display_name: DeepSeek V4 Flash
    use: langchain_openai:ChatOpenAI
    model: deepseek-v4-flash
    api_key: $DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    request_timeout: 600.0
    max_retries: 2
    max_tokens: 8192
    temperature: 0.2
    supports_thinking: false
    supports_reasoning_effort: false
    supports_vision: false

tools:
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5
    safesearch: moderate

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: glob
    group: file:read
    use: deerflow.sandbox.tools:glob_tool
    max_results: 200

  - name: grep
    group: file:read
    use: deerflow.sandbox.tools:grep_tool
    max_results: 100

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

uploads:
  max_files: 10
  max_file_size: 52428800
  max_total_size: 104857600
  auto_convert_documents: false
  pdf_converter: auto

# Production recommendation: use container isolation for untrusted workflows.
# This requires Docker access on the ECS host. If you cannot safely expose the
# Docker socket to the Gateway container, use the LocalSandboxProvider below
# with allow_host_bash=false and keep shell-like tools disabled by guardrails.
sandbox:
  use: deerflow.community.aio_sandbox:AioSandboxProvider
  image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
  port: 8080
  replicas: 3
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000

skills:
  container_path: /mnt/skills

database:
  backend: sqlite
  sqlite_dir: .deer-flow/data

run_events:
  backend: db

loop_detection:
  enabled: true
  warn_threshold: 3
  hard_limit: 5
  window_size: 20
  max_tracked_threads: 100
  tool_freq_warn: 30
  tool_freq_hard_limit: 50

safety_finish_reason:
  enabled: true

circuit_breaker:
  failure_threshold: 5
  recovery_timeout_sec: 60

guardrails:
  enabled: true
  provider:
    use: deerflow.guardrails.builtin:AllowlistProvider
    config:
      denied_tools:
        - bash

